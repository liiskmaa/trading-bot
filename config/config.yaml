trading:
  symbol: "BTCUSDT"
  # Modes: dry_run (print only), paper (simulated fills, real data), live (real money)
  mode: "paper"
  # Must be set to true before live mode is allowed
  live_confirmation: false

capital:
  # All amounts in USDT (convert EUR at current rate before setting)
  total_usdt: 540.0         # ~500 EUR
  active_trading_usdt: 324.0 # ~300 EUR
  reserve_usdt: 216.0        # ~200 EUR
  order_size_usdt: 16.0      # 20 levels x $16 ~= $320, fits active capital

grid:
  # Static wide grid. Backtests (3 real BTC regimes) showed the old
  # rebuild-on-drift grid (re-centering every 3%) had deeply negative edge in
  # EVERY regime (-36% to -57% before the drawdown stop masked it): it chased
  # price down and churned losing inventory. A wide grid that does NOT re-center
  # (goes dormant outside its band) instead makes money in ranging (+7%),
  # preserves capital in downtrends (-9% vs -18% hold), and stays positive but
  # capped in bulls (+11%).
  range_percent: 30.0
  levels: 20
  # 999 = effectively never re-center. NOTE: a static grid holds inventory
  # through dips, so it conflicts with the 8% drawdown stop below (which will
  # trip near a trough and neuter the edge). Revisit risk.max_drawdown_percent
  # together with this setting before going live.
  rebuild_threshold_percent: 999.0

risk:
  max_drawdown_percent: 8.0
  consecutive_loss_limit: 3
  cooldown_minutes: 20
  # Triggers emergency exit when price moves this much within the window
  emergency_price_move_percent: 7.0
  emergency_price_window_seconds: 300

# Moving-average crossover strategy.
# Set enabled: true to use instead of (or alongside) the grid.
# Needs ~slow_period days of candle history before it can trade.
# Note: shares the same capital pool as the grid — enable one or the other.
ma_strategy:
  enabled: false
  fast_period: 20
  slow_period: 50
  check_interval_hours: 4

ai_filter:
  enabled: true
  cache_ttl_seconds: 60
  call_interval_seconds: 60

binance:
  # Set testnet: false for live trading
  testnet: true
  api_key: ""
  api_secret: ""
  ws_reconnect_delay_seconds: 5
  ws_max_reconnect_delay_seconds: 60
  order_retry_attempts: 3
  order_retry_delay_seconds: 2.0
  # User data stream keepalive interval
  listen_key_refresh_minutes: 30

redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""
  ttl:
    price_seconds: 10
    grid_state_seconds: 300
    ai_output_seconds: 60
    risk_flags_seconds: 3600

database:
  path: "data/trading_bot.db"

logging:
  level: "INFO"
  path: "logs/"
  max_bytes: 10485760   # 10 MB
  backup_count: 5

monitoring:
  enabled: true
  host: "0.0.0.0"
  port: 8080
