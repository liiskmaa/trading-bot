# -----------------------------------------------------------------------
# Grid Trading Bot — Docker Compose
#
# Services:
#   redis      — in-memory cache for prices, grid state, AI output, risk flags
#   bot        — the trading bot (exposes /metrics at :8080)
#   prometheus — scrapes bot metrics every 5s
#   grafana    — dashboard at http://localhost:3000  (admin / admin)
#
# SQLite database and logs live in named volumes on the host.
# The regime classifier model (data/regime_model.pkl) lives in bot_data.
#
# Usage:
#   docker compose up -d              # start all
#   docker compose logs -f bot        # follow bot logs
#   docker compose exec bot python main.py train-regime   # train classifier
#   docker compose exec bot python main.py backtest --start 2024-01-01 --end 2024-06-30
#   docker compose down               # stop all (data is preserved)
# -----------------------------------------------------------------------

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"   # remove this line in production to avoid exposure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M    # Redis is lightweight; protect Pi RAM

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gridbot:latest
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS__HOST=redis   # Docker service name — overrides config.yaml "localhost"
      # Override config values via env vars if needed:
      # BINANCE_API_KEY and BINANCE_API_SECRET are read by config/config.yaml
      # Prefer using .env file (see .env.example)
    env_file:
      - ../.env
    volumes:
      - bot_data:/app/data          # SQLite database + trained model
      - bot_logs:/app/logs          # Rotating log files
      - ../config:/app/config:ro    # Config is read-only inside container
    ports:
      - "8088:8080"                 # Monitoring endpoint (8080 reserved by Pi-hole)
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/status')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M   # Extra headroom for numpy/sklearn inference on Pi 4

  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    depends_on:
      bot:
        condition: service_healthy
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    deploy:
      resources:
        limits:
          memory: 256M   # Prometheus is heavier; keep it bounded on Pi

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 128M   # Minimal Grafana footprint on Pi 4

volumes:
  redis_data:
  bot_data:
  bot_logs:
  prometheus_data:
  grafana_data:
